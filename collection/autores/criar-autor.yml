info:
  name: criar-autor
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/autores"
  body:
    type: json
    data: |-
      {
        "nome": "H.P. Lovecraft",
        "nacionalidade": "Ingles"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
