name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js LTS Version
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"
      - run: npm ci
      - run: npm run lint:check
  test-unit:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js LTS Version
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"
      - run: npm ci
      - run: env > .env.test
      - run: npm run test:unit:all
  test-integration-e2e:
    name: "Test Integration and E2E"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: livraria
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/livraria
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js LTS Version
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"
      - run: npm ci
      - name: Inicializar banco de dados
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d livraria -f docker/init/01-create-tables.sql
          psql -h localhost -U postgres -f docker/init/02-create-test-db.sql
      - run: env > .env.test
      - run: npm run test:int:all
      - run: npm run test:e2e:all
